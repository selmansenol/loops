# Production stack for a single server (e.g. a DigitalOcean Droplet):
#   app (Loops) + Postgres + Caddy (automatic HTTPS).
#
# 1. Point your domain's A record (and www) at the server's IP.
# 2. Copy .env.example to .env and fill it in. Critically:
#      BETTER_AUTH_URL=https://getloops.co
#      BETTER_AUTH_SECRET=<openssl rand -base64 32>
#      POSTGRES_PASSWORD=<a strong password>   (also used in DATABASE_URL below)
# 3. Edit the domain in ./Caddyfile.
# 4. docker compose -f docker-compose.prod.yml up -d --build
#
# Caddy obtains and renews TLS certificates automatically (ports 80/443 must be open).

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: loops
    volumes:
      - loop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loops"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/loops
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?set BETTER_AUTH_URL in .env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SINGLE_TENANT_SLUG: ${SINGLE_TENANT_SLUG:-}
      DEMO_WORKSPACE_SLUG: ${DEMO_WORKSPACE_SLUG:-}
      FREE_TIER_MAX_BOARDS: ${FREE_TIER_MAX_BOARDS:-}
      FEEDBACK_WORKSPACE_SLUG: ${FEEDBACK_WORKSPACE_SLUG:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      LOOP_AI_PROVIDER: ${LOOP_AI_PROVIDER:-}
      LOOP_AI_MODEL: ${LOOP_AI_MODEL:-}
      PORT: 3000
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  loop_pgdata:
  caddy_data:
  caddy_config:
