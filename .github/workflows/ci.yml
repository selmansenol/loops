name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: loop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/loop_test
      BETTER_AUTH_SECRET: ci-test-secret-not-used-in-prod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Apply migrations
        run: npm run db:migrate

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
